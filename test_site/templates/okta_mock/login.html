<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okta - 企业单点登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .okta-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            width: 400px;
            overflow: hidden;
        }
        .okta-header {
            background: #00297a;
            padding: 30px;
            text-align: center;
        }
        .okta-logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .okta-logo span { color: #00b0e8; }
        .okta-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 6px;
        }
        .okta-body { padding: 30px; }
        .okta-body h2 {
            color: #1d1d1d;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00297a;
            box-shadow: 0 0 0 2px rgba(0,41,122,0.1);
        }
        .okta-btn {
            width: 100%;
            padding: 12px;
            background: #00297a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .okta-btn:hover { background: #003399; }
        .error-box {
            background: #fff3f3;
            border: 1px solid #ffcccc;
            border-radius: 4px;
            padding: 10px 14px;
            color: #cc0000;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .okta-footer {
            text-align: center;
            padding: 16px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .mock-badge {
            display: inline-block;
            background: #ff6b35;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="okta-container">
        <div class="okta-header">
            <div class="okta-logo">OK<span>TA</span> <span class="mock-badge">MOCK</span></div>
            <div class="okta-subtitle">企业单点登录 (SSO) 模拟环境</div>
        </div>
        <div class="okta-body">
            <h2>登录到您的账户</h2>
            {% if error %}
                <div class="error-box" id="okta-error">{{ error }}</div>
            {% endif %}
            <form method="post" action="{% url 'okta_callback' %}" id="okta-login-form">
                {% csrf_token %}
                <input type="hidden" name="next_url" value="{{ next_url }}">
                <div class="form-group">
                    <label for="okta-username">企业邮箱 / 用户名</label>
                    <input type="text" id="okta-username" name="username"
                           placeholder="user@company.com" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="okta-password">密码</label>
                    <input type="password" id="okta-password" name="password"
                           placeholder="输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="okta-btn" id="okta-submit">登录</button>
            </form>
        </div>
        <div class="okta-footer">
            模拟 OKTA SSO 环境 · 仅用于自动化测试
        </div>
    </div>
</body>
</html>
